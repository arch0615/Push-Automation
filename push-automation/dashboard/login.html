<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Push Automation</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(3deg); }
    }
    @keyframes float-reverse {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(-3deg); }
    }
    .blob { animation: float 8s ease-in-out infinite; }
    .blob-2 { animation: float-reverse 10s ease-in-out infinite; }
    .glow-input:focus-within {
      box-shadow: 0 0 0 4px rgba(139,92,246,0.12);
      border-color: #8b5cf6;
    }
    @keyframes slide-up {
      0% { transform: translateY(20px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    .animate-slide-up { animation: slide-up 0.5s ease-out; }
  </style>
</head>
<body class="min-h-screen bg-zinc-950 overflow-hidden relative flex items-center justify-center p-4">
  <!-- Gradient blobs -->
  <div class="absolute top-0 -left-40 w-[500px] h-[500px] bg-violet-600/30 rounded-full blur-3xl blob"></div>
  <div class="absolute bottom-0 -right-40 w-[500px] h-[500px] bg-fuchsia-600/30 rounded-full blur-3xl blob-2"></div>
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[400px] h-[400px] bg-indigo-500/10 rounded-full blur-3xl"></div>

  <!-- Grid pattern -->
  <div class="absolute inset-0 opacity-[0.03]" style="background-image: linear-gradient(#fff 1px, transparent 1px), linear-gradient(90deg, #fff 1px, transparent 1px); background-size: 40px 40px;"></div>

  <div class="relative w-full max-w-md animate-slide-up">
    <!-- Logo -->
    <div class="flex items-center justify-center mb-8">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-violet-500 to-fuchsia-500 flex items-center justify-center shadow-2xl shadow-violet-500/30">
          <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.4-1.4A2 2 0 0118 14.2V11a6 6 0 10-12 0v3.2c0 .5-.2 1-.6 1.4L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
          </svg>
        </div>
        <div>
          <div class="font-bold text-white text-xl tracking-tight">Push Automation</div>
          <div class="text-[11px] text-zinc-400 font-medium uppercase tracking-wider">Painel de controle</div>
        </div>
      </div>
    </div>

    <!-- Card -->
    <div class="bg-white/5 backdrop-blur-xl rounded-3xl border border-white/10 shadow-2xl p-8">
      <div class="text-center mb-6">
        <h1 class="text-2xl font-bold text-white mb-1">Bem-vindo de volta</h1>
        <p class="text-sm text-zinc-400">Entre com suas credenciais</p>
      </div>

      <form id="loginForm" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-2">Usuário</label>
          <div class="relative glow-input rounded-xl border border-white/10 bg-white/5 transition">
            <div class="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            </div>
            <input name="username" type="text" required autocomplete="username"
                   class="w-full bg-transparent pl-11 pr-4 py-3 text-white text-sm focus:outline-none placeholder-zinc-600"
                   placeholder="admin"/>
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-2">Senha</label>
          <div class="relative glow-input rounded-xl border border-white/10 bg-white/5 transition">
            <div class="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            </div>
            <input name="password" type="password" required autocomplete="current-password"
                   class="w-full bg-transparent pl-11 pr-4 py-3 text-white text-sm focus:outline-none placeholder-zinc-600"
                   placeholder="••••••••"/>
          </div>
        </div>

        <button type="submit"
                class="w-full relative group bg-gradient-to-br from-violet-500 to-fuchsia-500 hover:shadow-lg hover:shadow-violet-500/40 text-white font-semibold py-3 rounded-xl transition-all duration-200 hover:-translate-y-0.5">
          <span class="flex items-center justify-center gap-2">
            Entrar
            <svg class="w-4 h-4 group-hover:translate-x-1 transition" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
          </span>
        </button>

        <div id="error" class="hidden p-3 rounded-xl bg-rose-500/10 border border-rose-500/20 text-rose-300 text-sm text-center"></div>
      </form>

      <div class="mt-6 pt-6 border-t border-white/10">
        <div class="flex items-center justify-center gap-2 text-xs text-zinc-500">
          <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
          Sistema online · SSL ativo
        </div>
      </div>
    </div>

    <div class="mt-6 text-center text-xs text-zinc-600">
      Protegido por autenticação de sessão
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.add('hidden');
      const data = Object.fromEntries(new FormData(form));
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
        const j = await res.json();
        if (!res.ok) {
          errorEl.textContent = j.error || 'Falha ao entrar';
          errorEl.classList.remove('hidden');
          return;
        }
        window.location.href = '/';
      } catch (err) {
        errorEl.textContent = 'Erro de conexão';
        errorEl.classList.remove('hidden');
      }
    });

    fetch('/api/auth/me').then(r => r.json()).then(j => {
      if (j.authenticated) window.location.href = '/';
    });
  </script>
</body>
</html>
